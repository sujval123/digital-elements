<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Atomic Lab | JEE & Organic Edition</title>
    <meta name="viewport" content="width=1024, initial-scale=0.1">
    <style>
        :root { --neon: #00f2ff; --bg: #03070a; --panel: #0d151d; --purple: #a855f7; }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        #header { height: 50px; background: var(--panel); border-bottom: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; z-index: 20; position: relative; }
        h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; color: var(--neon); text-transform: uppercase; }

        #main-container { display: flex; height: calc(100vh - 50px); width: 100vw; padding: 10px; gap: 10px; }

        #sidebar { width: 320px; display: flex; flex-direction: column; background: rgba(255,255,255,0.02); border-radius: 10px; padding: 5px; }
        #table-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; overflow-y: auto; flex: 1; padding-right: 5px; }
        .card { background: var(--panel); border: 1px solid #222; padding: 8px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; border-radius: 4px; }
        .card:hover { border-color: var(--neon); background: #162431; }
        .card.selected { background: var(--neon); color: #000; border-color: #fff; font-weight: bold; }
        .z { position: absolute; top: 2px; left: 4px; font-size: 9px; opacity: 0.7; }
        .sym { font-size: 1.1rem; display: block; }

        #visualizer-container { flex: 1; position: relative; background: #000; border-radius: 10px; border: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        #canvas-wrap { flex: 1; position: relative; width: 100%; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #info-overlay { 
            position: absolute; top: 15px; left: 15px; width: 300px; 
            background: rgba(3, 7, 10, 0.9); border-left: 4px solid var(--neon); 
            padding: 15px; pointer-events: none; z-index: 10; border-radius: 0 8px 8px 0;
        }
        .data-row { margin-bottom: 8px; }
        .tag { color: #888; font-size: 9px; text-transform: uppercase; display: block; }
        .val { color: var(--neon); font-family: 'Consolas', monospace; font-size: 0.9rem; line-height: 1.2; display: block; }

        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
        .btn { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px 16px; cursor: pointer; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .btn:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="header"><h1>Atomic System & Organic Visualizer</h1></div>

<div id="main-container">
    <div id="sidebar">
        <div id="table-grid"></div>
    </div>

    <div id="visualizer-container">
        <div id="info-overlay">
            <h2 id="disp-name" style="margin:0 0 10px 0; color:#fff; font-size:1.4rem">Select Element</h2>
            <div class="data-row"><span class="tag">Mass / Formula</span><span class="val" id="disp-mass">-</span></div>
            <div class="data-row"><span class="tag">Valency / Bonding</span><span class="val" id="disp-val">-</span></div>
            <div class="data-row"><span class="tag">Shell Config</span><span class="val" id="disp-bohr">-</span></div>
            <div class="data-row"><span class="tag">Quantum Subshells</span><span class="val" id="disp-quant">-</span></div>
        </div>

        <div id="canvas-wrap">
            <canvas id="atomCanvas"></canvas>
        </div>

        <div id="controls">
            <button class="btn" onclick="togglePause()" id="pBtn">Pause</button>
            <button class="btn" onclick="combine()" style="border-color:#7000ff; color:#7000ff">Combine</button>
            <button class="btn" onclick="resetAll()" style="color:#ff4444; border-color:#ff4444">Reset</button>
        </div>
    </div>
</div>

<script>
const elements = [
    {z:1, s:'H', n:'Hydrogen', m:1.008, v:1, q:'1s¹', b:[1]},
    {z:2, s:'He', n:'Helium', m:4.002, v:0, q:'1s²', b:[2]},
    {z:6, s:'C', n:'Carbon', m:12.01, v:4, q:'1s² 2s² 2p²', b:[2,4]},
    {z:7, s:'N', n:'Nitrogen', m:14.00, v:3, q:'1s² 2s² 2p³', b:[2,5]},
    {z:8, s:'O', n:'Oxygen', m:15.99, v:2, q:'1s² 2s² 2p⁴', b:[2,6]},
    {z:11, s:'Na', n:'Sodium', m:22.98, v:1, q:'[Ne] 3s¹', b:[2,8,1]},
    {z:12, s:'Mg', n:'Magnesium', m:24.30, v:2, q:'[Ne] 3s²', b:[2,8,2]},
    {z:13, s:'Al', n:'Aluminium', m:26.98, v:3, q:'[Ne] 3s² 3p¹', b:[2,8,3]},
    {z:17, s:'Cl', n:'Chlorine', m:35.45, v:1, q:'[Ne] 3s² 3p⁵', b:[2,8,7]},
    {z:20, s:'Ca', n:'Calcium', m:40.07, v:2, q:'[Ar] 4s²', b:[2,8,8,2]},
    {z:26, s:'Fe', n:'Iron', m:55.84, v:3, q:'[Ar] 3d⁶ 4s²', b:[2,8,14,2]},
    {z:29, s:'Cu', n:'Copper', m:63.54, v:2, q:'[Ar] 3d¹⁰ 4s¹', b:[2,8,18,1]},
    {z:30, s:'Zn', n:'Zinc', m:65.38, v:2, q:'[Ar] 3d¹⁰ 4s²', b:[2,8,18,2]},
    {z:47, s:'Ag', n:'Silver', m:107.8, v:1, q:'[Kr] 4d¹⁰ 5s¹', b:[2,8,18,18,1]},
    {z:79, s:'Au', n:'Gold', m:196.9, v:3, q:'[Xe] 4f¹⁴ 5d¹⁰ 6s¹', b:[2,8,18,32,18,1]}
];

const radicals = [
    {s:'OH', n:'Hydroxide', v:1, color:'#ff00ff'},
    {s:'SO4', n:'Sulfate', v:2, color:'#ffff00'},
    {s:'NO3', n:'Nitrate', v:1, color:'#00ff00'},
    {s:'CO3', n:'Carbonate', v:2, color:'#ffa500'},
    {s:'PO4', n:'Phosphate', v:3, color:'#0000ff'},
    {s:'NH4', n:'Ammonium', v:1, color:'#ffffff'}
];

const canvas = document.getElementById('atomCanvas');
const ctx = canvas.getContext('2d');
let selected = [];
let isPaused = false;
let angle = 0;
let currentOrganic = { type: null, count: 0 };

function initTable() {
    const grid = document.getElementById('table-grid');
    grid.innerHTML = "";
    
    elements.forEach(el => {
        const d = document.createElement('div');
        d.className = 'card';
        d.innerHTML = `<span class="z">${el.z}</span><span class="sym">${el.s}</span>`;
        d.onclick = () => selectItem(el, d);
        grid.appendChild(d);
    });

    const rLabel = document.createElement('div');
    rLabel.innerHTML = "JEE Radicals";
    rLabel.style = "grid-column: span 3; color: var(--purple); font-size: 11px; margin: 15px 0 5px 0; font-weight: bold; border-top: 1px solid #333; padding-top: 10px; text-align:center;";
    grid.appendChild(rLabel);

    radicals.forEach(r => {
        const d = document.createElement('div');
        d.className = 'card';
        d.innerHTML = `<span class="sym" style="color:${r.color}">${r.s}</span>`;
        d.onclick = () => selectItem(r, d);
        grid.appendChild(d);
    });

    const oLabel = document.createElement('div');
    oLabel.innerHTML = "Organic Series";
    oLabel.style = "grid-column: span 3; color: var(--neon); font-size: 11px; margin: 15px 0 5px 0; font-weight: bold; border-top: 1px solid #333; padding-top: 10px; text-align:center;";
    grid.appendChild(oLabel);

    ['Alkane', 'Alkene', 'Alkyne'].forEach(type => {
        const d = document.createElement('div');
        d.className = 'card';
        d.innerHTML = `<span class="sym" style="font-size:0.8rem">${type}</span>`;
        d.onclick = () => {
            let count = prompt(`Number of Carbons for ${type} (1-8):`, "1");
            let cCount = parseInt(count);
            if(cCount > 0 && cCount <= 8) buildOrganic(type.toLowerCase(), cCount);
            else alert("Enter 1-8 carbons");
        };
        grid.appendChild(d);
    });
}

function selectItem(item, element) {
    currentOrganic = { type: null, count: 0 };
    if(selected.includes(item)) {
        selected = selected.filter(x => x !== item);
        element.classList.remove('selected');
    } else if(selected.length < 2) {
        selected.push(item);
        element.classList.add('selected');
    }
    updateUI();
}

function updateUI() {
    if(selected.length === 1) {
        const e = selected[0];
        document.getElementById('disp-name').innerText = e.n;
        document.getElementById('disp-mass').innerText = e.m ? e.m + " u" : "Radical Group";
        document.getElementById('disp-val').innerText = "Valency: " + e.v;
        document.getElementById('disp-bohr').innerText = e.b ? e.b.join(', ') : "N/A";
        document.getElementById('disp-quant').innerText = e.q || "N/A";
    } else if (selected.length === 0 && !currentOrganic.type) {
        document.getElementById('disp-name').innerText = "Select Element";
        ["disp-mass", "disp-val", "disp-bohr", "disp-quant"].forEach(id => document.getElementById(id).innerText = "-");
    }
}

function buildOrganic(type, count) {
    selected = [];
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    
    const pre = ["", "Meth", "Eth", "Prop", "But", "Pent", "Hex", "Hept", "Oct"];
    let h = 0, suffix = "", hybridization = "";

    if (type === 'alkane') { h = (2 * count) + 2; suffix = "ane"; hybridization = "sp³"; }
    else if (type === 'alkene') { if(count<2) {alert("Start from C2"); return;} h = (2 * count); suffix = "ene"; hybridization = "sp²"; }
    else if (type === 'alkyne') { if(count<2) {alert("Start from C2"); return;} h = (2 * count) - 2; suffix = "yne"; hybridization = "sp"; }

    document.getElementById('disp-name').innerText = pre[count] + suffix;
    document.getElementById('disp-mass').innerText = `Formula: C${count}H${h}`;
    document.getElementById('disp-val').innerText = type.toUpperCase();
    document.getElementById('disp-bohr').innerText = "Hybridization: " + hybridization;
    document.getElementById('disp-quant').innerText = "Structure: Saturated/Unsaturated Chain";

    currentOrganic = { type: type, count: count };
}

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

function combine() {
    if (selected.length !== 2) { alert("Select two items."); return; }
    let [e1, e2] = selected;
    if (!e1.z && e2.z) [e1, e2] = [e2, e1]; 
    if (e1.v === 0 || e2.v === 0) { alert("Inert gas detected."); return; }

    const v1 = e1.v, v2 = e2.v;
    const common = gcd(v1, v2);
    const n1 = v2 / common, n2 = v1 / common;

    const fmt = (it, c) => (c === 1) ? it.s : (it.s.length > 1 && !it.z ? `(${it.s})${c}` : `${it.s}${c}`);
    const formula = fmt(e1, n1) + fmt(e2, n2);

    document.getElementById('disp-name').innerText = formula;
    document.getElementById('disp-val').innerText = `Criss-Cross Bond: ${e1.s}(${v1}) + ${e2.s}(${v2})`;
    document.getElementById('disp-mass').innerText = "Compound Result";
}

function drawAtom(el, x, y, scale) {
    if(!el.b) {
        ctx.beginPath(); ctx.arc(x, y, 30*scale, 0, Math.PI*2);
        ctx.fillStyle = el.color || "#purple"; ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = `bold ${16*scale}px Arial`;
        ctx.fillText(el.s, x, y+5);
        return;
    }
    ctx.beginPath(); ctx.arc(x, y, 20*scale, 0, Math.PI*2);
    ctx.fillStyle = "#ff3b3b"; ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = `bold ${14*scale}px Arial`; ctx.textAlign = "center";
    ctx.fillText(el.s, x, y + 5*scale);

    el.b.forEach((count, i) => {
        const r = (50 + i * 35) * scale;
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
        ctx.strokeStyle = "rgba(0, 242, 255, 0.2)"; ctx.stroke();
        for(let j=0; j<count; j++) {
            const a = (j * Math.PI*2/count) + (angle * (1/(i+1)));
            ctx.beginPath(); ctx.arc(x + Math.cos(a)*r, y + Math.sin(a)*r, 4*scale, 0, Math.PI*2);
            ctx.fillStyle = "#00f2ff"; ctx.fill();
        }
    });
}

function drawOrganicStructure() {
    const { type, count } = currentOrganic;
    const spacing = 70, y = canvas.height / 2;
    const startX = (canvas.width / 2) - ((count - 1) * spacing) / 2;

    for (let i = 0; i < count; i++) {
        const cx = startX + (i * spacing);
        ctx.beginPath(); ctx.arc(cx, y, 18, 0, Math.PI * 2);
        ctx.fillStyle = "#1a1a1a"; ctx.fill();
        ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial"; ctx.fillText("C", cx, y + 6);

        if (i < count - 1) {
            const nextX = cx + spacing, bS = cx + 18, bE = nextX - 18;
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
            if (type === 'alkane') { ctx.beginPath(); ctx.moveTo(bS, y); ctx.lineTo(bE, y); ctx.stroke(); }
            else if (type === 'alkene' && i === 0) {
                ctx.beginPath(); ctx.moveTo(bS, y-4); ctx.lineTo(bE, y-4); ctx.moveTo(bS, y+4); ctx.lineTo(bE, y+4); ctx.stroke();
            } else if (type === 'alkyne' && i === 0) {
                ctx.beginPath(); ctx.moveTo(bS, y-7); ctx.lineTo(bE, y-7); ctx.moveTo(bS, y); ctx.lineTo(bE, y); ctx.moveTo(bS, y+7); ctx.lineTo(bE, y+7); ctx.stroke();
            } else { ctx.beginPath(); ctx.moveTo(bS, y); ctx.lineTo(bE, y); ctx.stroke(); }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!isPaused) angle += 0.015;
    if (currentOrganic.type) drawOrganicStructure();
    else if (selected.length === 1) drawAtom(selected[0], canvas.width/2, canvas.height/2, 1);
    else if (selected.length === 2) {
        drawAtom(selected[0], canvas.width/2 - 140, canvas.height/2, 0.7);
        drawAtom(selected[1], canvas.width/2 + 140, canvas.height/2, 0.7);
    }
    requestAnimationFrame(animate);
}

function resetAll() { selected = []; currentOrganic = {type:null, count:0}; document.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); updateUI(); }
function togglePause() { isPaused = !isPaused; document.getElementById('pBtn').innerText = isPaused ? "Resume" : "Pause"; }
function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }

window.onload = () => { initTable(); resize(); animate(); };
window.onresize = resize;
</script>
</body>
</html>
